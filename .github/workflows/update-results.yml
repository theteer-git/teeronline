name: Update Teer Results From API

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: update-teer-results
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch API and update JSON files
        run: |
          node <<'NODE'
          const fs = require("fs");

          const API_URL = "https://teer-api-v2.maya-digital-rkn.workers.dev/latest";

          // File paths
          const ALL_JSON_PATH = "data/all-results.json";
          const LATEST_JSON_PATH = "data/latest-results.json";
          const RECENT_JSON_PATH = "data/recent-results.json";
          const RECENT_PER_GAME = 10;

          // Game metadata
          const GAME_MAP = {
            SHD:  { game: "shillong day", city: "Shillong", frDeclaredTime: "4:15 PM",  srDeclaredTime: "5:15 PM" },
            KH:   { game: "khanapara day", city: "Khanapara", frDeclaredTime: "4:25 PM", srDeclaredTime: "5:00 PM" },
            JWD:  { game: "juwai day", city: "Juwai", frDeclaredTime: "2:30 PM", srDeclaredTime: "3:15 PM" },
            SHM:  { game: "shillong morning", city: "Shillong", frDeclaredTime: "10:30 AM", srDeclaredTime: "11:30 AM" },
            KHM:  { game: "khanapara morning", city: "Khanapara", frDeclaredTime: "11:00 AM", srDeclaredTime: "12:00 PM" },
            JWM:  { game: "juwai morning", city: "Juwai", frDeclaredTime: "10:30 AM", srDeclaredTime: "11:30 AM" },
            SHN1: { game: "Shillong Night", city: "Shillong", frDeclaredTime: "8:45 PM", srDeclaredTime: "9:45 PM" },
            SHN2: { game: "Shillong Night 2", city: "Shillong", frDeclaredTime: "11:10 PM", srDeclaredTime: "12:10 AM" }
          };

          const GAME_IDS = Object.keys(GAME_MAP);

          // ============================================================
          // CRITICAL: Historical data that MUST be preserved
          // ============================================================
          const PRESERVED_RECORDS = [
            { g: "SHD", d: "2026-07-06", f: "52", s: "59" }
          ];

          // ============================================================
          // Helper functions
          // ============================================================
          function istNow() {
            const now = new Date();
            const ist = new Date(now.getTime() + 5.5 * 60 * 60 * 1000);
            return ist.toISOString().replace("Z", "+05:30");
          }

          function istDateToday() {
            return istNow().slice(0, 10);
          }

          function cleanNumber(value) {
            if (value === undefined || value === null) return "";
            const v = String(value).trim();
            if (!v || ["xx", "x", "na", "-", "--", "—", "null", "undefined"].includes(v.toLowerCase())) return "";
            if (!/^\d{1,2}$/.test(v)) return "";
            return String(Number(v)).padStart(2, "0");
          }

          function isValidNumber(value) {
            return /^\d{1,2}$/.test(String(value || "").trim());
          }

          function getApiRecords(apiData) {
            if (Array.isArray(apiData)) return apiData;
            if (Array.isArray(apiData.results)) return apiData.results;
            if (Array.isArray(apiData.data)) return apiData.data;
            if (apiData.records && typeof apiData.records === "object") return Object.values(apiData.records);
            return [];
          }

          function normalizeGameId(raw) {
            return String(raw?.g || raw?.gameId || raw?.game_id || "").toUpperCase().trim();
          }

          function normalizeDate(raw) {
            return String(raw?.d || raw?.date || "").trim();
          }

          function normalizeRecord(raw) {
            const gameId = normalizeGameId(raw);
            if (!GAME_MAP[gameId]) return null;

            const date = normalizeDate(raw);
            if (!date) return null;

            return {
              g: gameId,
              d: date,
              f: cleanNumber(raw?.f ?? raw?.fr ?? raw?.first_round),
              s: cleanNumber(raw?.s ?? raw?.sr ?? raw?.second_round)
            };
          }

          // ============================================================
          // FORMAT: all-results.json - abbreviated format
          // { "g": "SHD", "d": "2026-07-06", "f": "52", "s": "59" }
          // ============================================================
          function toAllResultsFormat(record) {
            return {
              g: record.g,
              d: record.d,
              f: record.f || "",
              s: record.s || ""
            };
          }

          // ============================================================
          // FORMAT: recent-results.json - verbose format with city
          // ============================================================
          function toRecentFormat(record) {
            const meta = GAME_MAP[record.g] || {};
            return {
              id: `${record.g}-${record.d}`,
              game: meta.game || record.g,
              city: meta.city || "",
              gameId: record.g,
              date: record.d,
              fr: record.f || "",
              frUpdatedAt: "",
              sr: record.s || "",
              srUpdatedAt: "",
              frDeclaredTime: meta.frDeclaredTime || "",
              srDeclaredTime: meta.srDeclaredTime || "",
              status: record.f && record.s ? "completed" : (record.f || record.s ? "partial" : "pending"),
              lastCheckedAt: ""
            };
          }

          // ============================================================
          // FORMAT: latest-results.json - verbose format
          // ============================================================
          function toLatestFormat(record, date, meta) {
            const now = istNow();
            return {
              id: `${record.g}-${date}`,
              game: meta.game || record.g,
              gameId: record.g,
              date: date,
              fr: record.f || "",
              sr: record.s || "",
              frUpdatedAt: record.f ? now : "",
              srUpdatedAt: record.s ? now : "",
              status: record.f && record.s ? "completed" : (record.f || record.s ? "partial" : "pending"),
              lastCheckedAt: now
            };
          }

          // ============================================================
          // Load existing data
          // ============================================================
          function loadExistingAllResults() {
            if (!fs.existsSync(ALL_JSON_PATH)) return [];
            try {
              const raw = JSON.parse(fs.readFileSync(ALL_JSON_PATH, "utf8"));
              const list = Array.isArray(raw) ? raw : (raw && Array.isArray(raw.records) ? raw.records : []);
              return list.map(normalizeRecord).filter(Boolean);
            } catch (e) {
              console.warn("Failed to read existing all-results.json, starting fresh");
              return [];
            }
          }

          function loadExistingRecentResults() {
            if (!fs.existsSync(RECENT_JSON_PATH)) return [];
            try {
              const raw = JSON.parse(fs.readFileSync(RECENT_JSON_PATH, "utf8"));
              return Array.isArray(raw) ? raw : [];
            } catch (e) {
              console.warn("Failed to read existing recent-results.json");
              return [];
            }
          }

          // ============================================================
          // Generate recent-results.json
          // ============================================================
          function generateRecentResults(allData) {
            const recent = [];

            for (const gameId of GAME_IDS) {
              const records = allData
                .filter(item =>
                  item &&
                  item.g === gameId &&
                  item.d &&
                  isValidNumber(item.f) &&
                  isValidNumber(item.s)
                )
                .sort((a, b) => String(b.d).localeCompare(String(a.d)))
                .slice(0, RECENT_PER_GAME)
                .map(toRecentFormat);

              recent.push(...records);
            }

            return recent.sort((a, b) => {
              if (a.date !== b.date) return String(b.date).localeCompare(String(a.date));
              return String(a.gameId).localeCompare(String(b.gameId));
            });
          }

          // ============================================================
          // Ensure historical data is preserved
          // ============================================================
          function ensureHistoricalData(map) {
            let added = 0;
            
            // Add preserved records
            for (const record of PRESERVED_RECORDS) {
              const key = `${record.g}-${record.d}`;
              if (!map.has(key)) {
                map.set(key, { ...record });
                added++;
                console.log(`✅ Preserved historical: ${key}`);
              }
            }

            // Preserve data from existing recent-results.json
            const existingRecent = loadExistingRecentResults();
            for (const item of existingRecent) {
              const key = `${item.gameId}-${item.date}`;
              if (!map.has(key) && item.fr && item.sr) {
                map.set(key, { g: item.gameId, d: item.date, f: item.fr, s: item.sr });
                added++;
                console.log(`✅ Preserved from recent: ${key}`);
              }
            }

            return added;
          }

          // ============================================================
          // Main function
          // ============================================================
          async function main() {
            console.log("🔍 Fetching from API:", API_URL);

            // Ensure data directory exists
            if (!fs.existsSync("data")) fs.mkdirSync("data", { recursive: true });
            if (!fs.existsSync(ALL_JSON_PATH)) fs.writeFileSync(ALL_JSON_PATH, "[]\n");

            // Load existing data
            const existing = loadExistingAllResults();
            console.log(`📁 Existing all-results.json: ${existing.length} records`);

            // Build map from existing data
            const map = new Map();
            for (const item of existing) {
              map.set(`${item.g}-${item.d}`, item);
            }

            // Fetch API data
            let apiData = null;
            let apiRecords = [];
            let currentDate = istDateToday();

            try {
              const response = await fetch(API_URL, { cache: "no-store" });
              if (!response.ok) throw new Error(`API failed with HTTP ${response.status}`);
              apiData = await response.json();
              currentDate = apiData.date || istDateToday();
              apiRecords = getApiRecords(apiData).map(normalizeRecord).filter(Boolean);
              console.log(`✅ API returned ${apiRecords.length} records`);
            } catch (error) {
              console.warn("⚠️ API fetch failed, using existing data:", error.message);
            }

            // Merge API records into map (PRESERVE existing data)
            let allChanged = false;
            if (apiRecords.length > 0) {
              for (const record of apiRecords) {
                if (!record.f && !record.s) continue;

                const key = `${record.g}-${record.d}`;
                const old = map.get(key);

                if (!old) {
                  map.set(key, record);
                  allChanged = true;
                  console.log(`➕ Added from API: ${key}`);
                } else {
                  // Merge: API values override, but keep existing if API has empty
                  const merged = {
                    g: record.g,
                    d: record.d,
                    f: record.f || old.f || "",
                    s: record.s || old.s || ""
                  };
                  if (JSON.stringify(old) !== JSON.stringify(merged)) {
                    map.set(key, merged);
                    allChanged = true;
                    console.log(`🔄 Updated from API: ${key}`);
                  }
                }
              }
            }

            // CRITICAL: Ensure historical data is preserved
            const preservedCount = ensureHistoricalData(map);
            if (preservedCount > 0) {
              allChanged = true;
              console.log(`📌 Preserved ${preservedCount} historical records`);
            }

            // ============================================================
            // WRITE all-results.json - abbreviated format
            // { "g": "SHD", "d": "2026-07-06", "f": "52", "s": "59" }
            // ============================================================
            const finalAllData = Array.from(map.values())
              .map(toAllResultsFormat)
              .sort((a, b) => {
                if (a.d !== b.d) return String(b.d).localeCompare(String(a.d));
                return String(a.g).localeCompare(String(b.g));
              });

            fs.writeFileSync(ALL_JSON_PATH, JSON.stringify(finalAllData, null, 2) + "\n");
            console.log(`📁 all-results.json: ${finalAllData.length} records (abbreviated format)`);

            // ============================================================
            // WRITE latest-results.json - verbose format
            // ============================================================
            const apiByGameId = {};
            for (const record of apiRecords) apiByGameId[record.g] = record;

            const latestRecords = {};
            const now = istNow();
            
            for (const gameId of GAME_IDS) {
              const apiRecord = apiByGameId[gameId] || null;
              const key = `${gameId}-${currentDate}`;
              const existingRecord = map.get(key) || apiRecord || { g: gameId, d: currentDate, f: "", s: "" };
              const meta = GAME_MAP[gameId];

              latestRecords[gameId] = {
                id: `${gameId}-${currentDate}`,
                game: meta.game,
                gameId: gameId,
                date: currentDate,
                fr: existingRecord.f || "",
                sr: existingRecord.s || "",
                frUpdatedAt: existingRecord.f ? now : "",
                srUpdatedAt: existingRecord.s ? now : "",
                status: existingRecord.f && existingRecord.s ? "completed" : (existingRecord.f || existingRecord.s ? "partial" : "pending"),
                lastCheckedAt: now
              };
            }

            const latestJson = {
              date: currentDate,
              lastUpdatedAt: apiData?.lastUpdatedAt || now,
              records: latestRecords
            };

            fs.writeFileSync(LATEST_JSON_PATH, JSON.stringify(latestJson, null, 2) + "\n");
            console.log(`📁 latest-results.json: ${Object.keys(latestRecords).length} records (verbose format)`);

            // ============================================================
            // WRITE recent-results.json - verbose format with city
            // ============================================================
            const recentData = generateRecentResults(finalAllData);

            // Safety check
            if (recentData.length < 30) {
              console.warn(`⚠️ Recent data has only ${recentData.length} records, but continuing...`);
            }

            fs.writeFileSync(RECENT_JSON_PATH, JSON.stringify(recentData, null, 2) + "\n");
            console.log(`📁 recent-results.json: ${recentData.length} records (verbose format with city)`);

            // ============================================================
            // Summary
            // ============================================================
            console.log("\n📊 Summary:");
            console.log(`  all-results.json: ${finalAllData.length} records (abbreviated: {g, d, f, s})`);
            console.log(`  latest-results.json: ${Object.keys(latestRecords).length} records (verbose)`);
            console.log(`  recent-results.json: ${recentData.length} records (verbose with city)`);
            console.log(allChanged ? "✅ JSON files updated successfully." : "⏭️ No changes detected.");

            // ============================================================
            // Verify SHD 2026-07-06 exists
            // ============================================================
            const shdExists = finalAllData.some(item => item.g === "SHD" && item.d === "2026-07-06");
            if (!shdExists) {
              console.warn("⚠️ WARNING: SHD 2026-07-06 is missing from all-results.json!");
            } else {
              const shdRecord = finalAllData.find(item => item.g === "SHD" && item.d === "2026-07-06");
              console.log(`✅ SHD 2026-07-06 present: FR=${shdRecord.f}, SR=${shdRecord.s}`);
            }
          }

          main().catch(error => {
            console.error("❌ Workflow failed:", error);
            process.exit(1);
          });
          NODE

      - name: Commit and push JSON changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/all-results.json data/latest-results.json data/recent-results.json

          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "Update Teer JSON files from API"
            git push
          fi

      - name: Invalidate Cloudflare cache
        if: github.ref == 'refs/heads/main'
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://teeronline.com/data/latest-results.json","https://teeronline.com/data/recent-results.json","https://teeronline.com/data/all-results.json"]}'