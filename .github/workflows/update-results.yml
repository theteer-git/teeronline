name: Update Teer Results From API

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch API and update JSON files
        run: |
          node <<'NODE'
          const fs = require("fs");

          const API_URL = "https://teer-api.maya-digital-rkn.workers.dev/latest";

          const ALL_JSON_PATH = "data/all-results.json";
          const LATEST_JSON_PATH = "data/latest-results.json";
          const RECENT_JSON_PATH = "data/recent-results.json";
          const RECENT_PER_GAME = 10;

          const GAME_MAP = {
            SHD:  { game: "shillong day", city: "Shillong", frDeclaredTime: "4:15 PM",  srDeclaredTime: "5:15 PM" },
            KH:   { game: "khanapara day", city: "Khanapara", frDeclaredTime: "4:25 PM", srDeclaredTime: "5:00 PM" },
            JWD:  { game: "juwai day", city: "Juwai", frDeclaredTime: "2:30 PM", srDeclaredTime: "3:15 PM" },
            SHM:  { game: "shillong morning", city: "Shillong", frDeclaredTime: "10:30 AM", srDeclaredTime: "11:30 AM" },
            KHM:  { game: "khanapara morning", city: "Khanapara", frDeclaredTime: "11:00 AM", srDeclaredTime: "12:00 PM" },
            JWM:  { game: "juwai morning", city: "Juwai", frDeclaredTime: "10:30 AM", srDeclaredTime: "11:30 AM" },
            SHN1: { game: "Shillong Night", city: "Shillong", frDeclaredTime: "8:45 PM", srDeclaredTime: "9:45 PM" },
            SHN2: { game: "Shillong Night 2", city: "Shillong", frDeclaredTime: "11:10 PM", srDeclaredTime: "12:10 AM" }
          };

          const GAME_IDS = Object.keys(GAME_MAP);

          function istNow() {
            const now = new Date();
            const ist = new Date(now.getTime() + 5.5 * 60 * 60 * 1000);
            return ist.toISOString().replace("Z", "+05:30");
          }

          function istDateToday() {
            return istNow().slice(0, 10);
          }

          function cleanNumber(value) {
            if (value === undefined || value === null) return "";
            const v = String(value).trim();
            if (!v || ["xx", "na", "-", "--", "null", "undefined"].includes(v.toLowerCase())) return "";
            if (!/^\d{1,2}$/.test(v)) return "";
            return v.padStart(2, "0");
          }

          function isValidNumber(value) {
            return /^\d{1,2}$/.test(String(value || "").trim());
          }

          function dateValue(date) {
            const d = new Date(date);
            return isNaN(d.getTime()) ? 0 : d.getTime();
          }

          function getApiRecords(apiData) {
            if (Array.isArray(apiData)) return apiData;
            if (Array.isArray(apiData.results)) return apiData.results;
            if (Array.isArray(apiData.data)) return apiData.data;
            if (apiData.records && typeof apiData.records === "object") return Object.values(apiData.records);
            return [];
          }

          function normalizeRecord(raw) {
            const gameId = String(raw.gameId || "").toUpperCase().trim();
            if (!GAME_MAP[gameId]) return null;

            const date = raw.date || "";
            if (!date) return null;

            const fr = cleanNumber(raw.fr);
            const sr = cleanNumber(raw.sr);
            const meta = GAME_MAP[gameId];
            const now = istNow();
            const status = fr && sr ? "completed" : (fr || sr ? "partial" : "pending");

            return {
              id: `${gameId}-${date}`,
              game: meta.game,
              city: meta.city,
              gameId,
              date,
              fr,
              frUpdatedAt: fr ? (raw.frUpdatedAt || now) : "",
              sr,
              srUpdatedAt: sr ? (raw.srUpdatedAt || now) : "",
              frDeclaredTime: raw.frDeclaredTime || meta.frDeclaredTime || "",
              srDeclaredTime: raw.srDeclaredTime || meta.srDeclaredTime || "",
              status,
              lastCheckedAt: raw.lastCheckedAt || now
            };
          }

          function pendingRecord(gameId, date) {
            const meta = GAME_MAP[gameId];
            const now = istNow();
            return {
              id: `${gameId}-${date}`,
              game: meta.game,
              city: meta.city,
              gameId,
              date,
              fr: "",
              frUpdatedAt: "",
              sr: "",
              srUpdatedAt: "",
              frDeclaredTime: meta.frDeclaredTime || "",
              srDeclaredTime: meta.srDeclaredTime || "",
              status: "pending",
              lastCheckedAt: now
            };
          }

          function generateRecentResults(allData) {
            const recent = [];

            for (const gameId of GAME_IDS) {
              const records = allData
                .filter(item =>
                  item &&
                  item.gameId === gameId &&
                  item.date &&
                  isValidNumber(item.fr) &&
                  isValidNumber(item.sr) &&
                  String(item.status || "").toLowerCase() === "completed"
                )
                .sort((a, b) => dateValue(b.date) - dateValue(a.date))
                .slice(0, RECENT_PER_GAME);

              recent.push(...records);
              console.log(`recent ${gameId}: ${records.length}`);
            }

            return recent.sort((a, b) => {
              if (a.date !== b.date) return String(b.date).localeCompare(String(a.date));
              return String(a.gameId).localeCompare(String(b.gameId));
            });
          }

          async function main() {
            console.log("Fetching:", API_URL);

            if (!fs.existsSync("data")) fs.mkdirSync("data", { recursive: true });
            if (!fs.existsSync(ALL_JSON_PATH)) fs.writeFileSync(ALL_JSON_PATH, "[]");

            const existingRaw = JSON.parse(fs.readFileSync(ALL_JSON_PATH, "utf8"));
            const existing = Array.isArray(existingRaw) ? existingRaw : [];

            const response = await fetch(API_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`API failed with HTTP ${response.status}`);

            const apiData = await response.json();
            const currentDate = apiData.date || istDateToday();

            const apiRecords = getApiRecords(apiData).map(normalizeRecord).filter(Boolean);
            console.log("Valid API records:", apiRecords.length);
            console.log("Current active date:", currentDate);

            const map = new Map();
            for (const item of existing) {
              if (item && item.id) map.set(item.id, item);
            }

            let allChanged = false;

            for (const record of apiRecords) {
              if (!record.fr && !record.sr) continue;

              const old = map.get(record.id);

              if (!old) {
                map.set(record.id, record);
                allChanged = true;
                console.log("Added:", record.id);
                continue;
              }

              const merged = {
                ...old,
                game: record.game,
                city: record.city,
                gameId: record.gameId,
                date: record.date,
                fr: record.fr || old.fr || "",
                sr: record.sr || old.sr || "",
                frDeclaredTime: record.frDeclaredTime || old.frDeclaredTime || "",
                srDeclaredTime: record.srDeclaredTime || old.srDeclaredTime || "",
                frUpdatedAt: record.fr
                  ? (old.fr === record.fr && old.frUpdatedAt ? old.frUpdatedAt : record.frUpdatedAt)
                  : old.frUpdatedAt || "",
                srUpdatedAt: record.sr
                  ? (old.sr === record.sr && old.srUpdatedAt ? old.srUpdatedAt : record.srUpdatedAt)
                  : old.srUpdatedAt || "",
                status: (record.fr || old.fr) && (record.sr || old.sr) ? "completed" : "partial",
                lastCheckedAt: record.lastCheckedAt || istNow()
              };

              if (JSON.stringify(old) !== JSON.stringify(merged)) {
                map.set(record.id, merged);
                allChanged = true;
                console.log("Updated:", record.id);
              }
            }

            const finalAllData = Array.from(map.values()).sort((a, b) => {
              if (a.date !== b.date) return String(b.date).localeCompare(String(a.date));
              return String(a.gameId).localeCompare(String(b.gameId));
            });

            fs.writeFileSync(ALL_JSON_PATH, JSON.stringify(finalAllData, null, 2) + "\n");

            const apiByGameId = {};
            for (const record of apiRecords) apiByGameId[record.gameId] = record;

            const latestRecords = {};

            for (const gameId of GAME_IDS) {
              const apiRecord = apiByGameId[gameId] || null;

              // IMPORTANT:
              // latest-results.json must always represent the current active date.
              // If API has current date pending, use pending current date.
              // Do NOT show yesterday's completed result as today's live card.
              if (apiRecord && apiRecord.date === currentDate) {
                latestRecords[gameId] = apiRecord;
              } else {
                latestRecords[gameId] = pendingRecord(gameId, currentDate);
              }

              // If all-results.json already has completed data for the same current date,
              // use that completed same-date data.
              const sameDateArchive = finalAllData.find(item =>
                item &&
                item.gameId === gameId &&
                item.date === currentDate &&
                isValidNumber(item.fr) &&
                isValidNumber(item.sr) &&
                String(item.status || "").toLowerCase() === "completed"
              );

              if (sameDateArchive) {
                latestRecords[gameId] = sameDateArchive;
              }

              console.log(`latest ${gameId}: ${latestRecords[gameId].id} ${latestRecords[gameId].status}`);
            }

            const latestJson = {
              date: currentDate,
              lastUpdatedAt: apiData.lastUpdatedAt || istNow(),
              records: latestRecords
            };

            fs.writeFileSync(LATEST_JSON_PATH, JSON.stringify(latestJson, null, 2) + "\n");

            const recentData = generateRecentResults(finalAllData);
            fs.writeFileSync(RECENT_JSON_PATH, JSON.stringify(recentData, null, 2) + "\n");

            console.log(`all-results.json records: ${finalAllData.length}`);
            console.log(`latest-results.json records: ${Object.keys(latestRecords).length}`);
            console.log(`recent-results.json records: ${recentData.length}`);
            console.log(allChanged ? "JSON updated successfully." : "No all-results changes, latest/recent regenerated.");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Commit and push JSON changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/all-results.json data/latest-results.json data/recent-results.json

          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "Update Teer JSON files from API"
            git push
          fi