name: Prepare Daily Game Pages

on:
  schedule:
    # GitHub cron uses UTC. Each run prepares every game whose IST
    # preparation time (FR minus 5 hours) has passed and is not yet prepared.
    - cron: "0 0 * * *"    # 05:30 IST — SHM, JWM
    - cron: "30 0 * * *"   # 06:00 IST — KHM
    - cron: "0 4 * * *"    # 09:30 IST — JWD
    - cron: "45 5 * * *"   # 11:15 IST — SHD
    - cron: "55 5 * * *"   # 11:25 IST — KH
    - cron: "15 10 * * *"  # 15:45 IST — SHN1
    - cron: "40 12 * * *"  # 18:10 IST — SHN2
  workflow_dispatch:
    inputs:
      game:
        description: "Optional game ID (SHD, KH, JWD, SHM, KHM, JWM, SHN1, SHN2). Leave blank to prepare all due games."
        required: false
        type: string
      force:
        description: "Prepare again even when the page is already prepared for today"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: teeronline-daily-game-preparation
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare due game pages
        shell: bash
        env:
          MANUAL_GAME: ${{ github.event.inputs.game || '' }}
          MANUAL_FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          args=("--due")
          if [[ -n "$MANUAL_GAME" ]]; then
            args=("--game=$MANUAL_GAME")
          fi
          if [[ "$MANUAL_FORCE" == "true" ]]; then
            args+=("--force")
          fi
          node scripts/prepare-daily-game-pages.mjs "${args[@]}"

      - name: Commit prepared pages
        shell: bash
        run: |
          git config user.name "teeronline-preparation-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- \
            index.html \
            khanapara-teer-results.html \
            juwai-teer-results.html \
            shillong-morning-teer-results.html \
            khanapara-morning-teer-results.html \
            juwai-morning-teer-results.html \
            shillong-night-teer-results.html \
            shillong-night-teer-2-results.html

          if git diff --cached --quiet; then
            echo "No game page required preparation."
            exit 0
          fi

          git commit -m "chore(seo): prepare daily game pages"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
