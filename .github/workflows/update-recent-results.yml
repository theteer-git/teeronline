name: Generate Recent Results JSON

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 4:00 AM IST = 10:30 PM UTC previous day
    - cron: "30 22 * * *"

permissions:
  contents: write

jobs:
  generate-recent-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate recent-results.json
        run: |
          node <<'NODE'
          const fs = require("fs");

          const ALL_JSON_PATH = "data/all-results.json";
          const RECENT_JSON_PATH = "data/recent-results.json";
          const RECENT_PER_GAME = 10;

          const GAME_IDS = [
            "SHD",
            "KH",
            "JWD",
            "SHM",
            "KHM",
            "JWM",
            "SHN1",
            "SHN2"
          ];

          function isValidNumber(value) {
            return /^\d{1,2}$/.test(String(value || "").trim());
          }

          function dateValue(date) {
            const d = new Date(date);
            return isNaN(d.getTime()) ? 0 : d.getTime();
          }

          if (!fs.existsSync(ALL_JSON_PATH)) {
            throw new Error("data/all-results.json not found");
          }

          const allRaw = JSON.parse(fs.readFileSync(ALL_JSON_PATH, "utf8"));
          const allData = Array.isArray(allRaw) ? allRaw : [];

          const recent = [];

          for (const gameId of GAME_IDS) {
            const records = allData
              .filter(item =>
                item &&
                item.gameId === gameId &&
                item.date &&
                isValidNumber(item.fr) &&
                isValidNumber(item.sr) &&
                String(item.status || "").toLowerCase() === "completed"
              )
              .sort((a, b) => dateValue(b.date) - dateValue(a.date))
              .slice(0, RECENT_PER_GAME);

            recent.push(...records);
            console.log(`${gameId}: ${records.length} records`);
          }

          recent.sort((a, b) => {
            if (a.date !== b.date) return b.date.localeCompare(a.date);
            return String(a.gameId).localeCompare(String(b.gameId));
          });

          fs.writeFileSync(
            RECENT_JSON_PATH,
            JSON.stringify(recent, null, 2) + "\n"
          );

          console.log(`recent-results.json created with ${recent.length} records`);
          NODE

      - name: Commit and push recent-results.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/recent-results.json

          if git diff --cached --quiet; then
            echo "No changes in recent-results.json"
          else
            git commit -m "Generate recent-results.json"
            git push
          fi