name: Generate SEO Assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cms/seo-pages.json"
      - "cms/keywords.csv"
      - "cms/keyword-routing.json"
      - "assets/scripts/generate-seo-assets.js"
      - "*.html"

concurrency:
  group: generate-seo-assets
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  seo-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate sitemap, robots, search, feed and SEO report
        run: node assets/scripts/generate-seo-assets.js

      - name: Commit SEO asset changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sitemap.xml sitemap-pages.xml robots.txt search.json llms.txt rss.xml feed.xml SEO_REPORT.md

          if git diff --cached --quiet; then
            echo "No SEO asset changes to commit."
          else
            git commit -m "Generate SEO assets from CMS keyword CSV"
            git push
          fi
